<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — Foot Plantar Sense</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-body">

  <div class="auth-layout">
    <!-- LEFT -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-icon">
          <img src="../assets/images/logo-foot.png" alt="Foot Plantar Sense Logo">
        </div>
        <div class="brand-name">Foot Plantar <span>Sense</span></div>
      </div>
      <p class="auth-tagline">Monitoring tekanan plantar kaki untuk keseimbangan &amp; rehabilitasi</p>
      <div class="auth-left-footer">v1.0.0 · Foot Plantar 2026</div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-card-title">Data <span>Akun</span></div>
        <p class="auth-card-subtitle" style="margin-bottom: var(--space-lg)">Langkah 1 dari 3</p>
        
        <!-- Step indicator -->
        <div class="steps-indicator">
          <div class="step-item">
            <div class="step-dot active">1</div>
            <span class="step-label active">Akun</span>
          </div>
          <div class="step-line"></div>
          <div class="step-item">
            <div class="step-dot">2</div>
            <span class="step-label">Data Diri</span>
          </div>
          <div class="step-line"></div>
          <div class="step-item">
            <div class="step-dot">3</div>
            <span class="step-label">Konfirmasi</span>
          </div>
          <div class="progress-line" id="progress-line" style="width:33%"></div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <!-- <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M1 6l7 4 7-4" stroke="currentColor" stroke-width="1.5"/></svg> -->
            <img src="../assets/images/email-icon.png" alt="Email Icon" class="input-icon" />
            Email
          </label>
          <input class="form-input" type="email" id="email" placeholder="nama@email.com" />
        </div>

        <div class="form-group">
          <label class="form-label">
            <!-- <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/></svg> -->
            <img src="../assets/images/password-icon.png" alt="Password Icon" class="input-icon" />
            Password
          </label>
          <div class="input-wrapper">
            <input class="form-input" type="password" id="password" placeholder="Min. 8 karakter" oninput="checkPasswordStrength(this.value)" />
            <button class="input-eye" onclick="togglePassword('password', this)" type="button">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
          </div>
          <div class="pw-strength">
            <div class="pw-bar" id="pw1"></div>
            <div class="pw-bar" id="pw2"></div>
            <div class="pw-bar" id="pw3"></div>
            <div class="pw-bar" id="pw4"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            <img src="../assets/images/password-icon.png" alt="Password Icon" class="input-icon" />
            Konfirmasi Password
          </label>
          <input class="form-input" type="password" id="confirm_password" placeholder="Ulangi password" />
        </div>

        <div class="form-group">
          <label class="form-label">
            <!-- <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="4" width="12" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M6 4V3a2 2 0 014 0v1" stroke="currentColor" stroke-width="1.5"/></svg> -->
            <img src="../assets/images/phone-icon.png" alt="Phone Icon" class="input-icon" />
            Nomor Telepon
          </label>
          <input class="form-input" type="tel" id="phone" placeholder="08xx xxxx xxxx" />
        </div>

        <button class="btn-primary" onclick="nextStep()">Lanjutkan →</button>
        <p class="auth-switch">Sudah punya akun? <a href="login.html">Masuk</a></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.style.opacity = input.type === 'text' ? '1' : '0.5';
    }

    function checkPasswordStrength(val) {
      const bars = [document.getElementById('pw1'), document.getElementById('pw2'),
                    document.getElementById('pw3'), document.getElementById('pw4')];
      bars.forEach(b => { b.className = 'pw-bar'; });
      if (!val) return;

      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const cls = score <= 1 ? 'weak' : score <= 3 ? 'medium' : 'strong';
      for (let i = 0; i < score; i++) bars[i].classList.add(cls);
    }

    function nextStep() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm_password').value;
      const phone    = document.getElementById('phone').value.trim();

      if (!email || !password || !confirm || !phone) {
        alert('Harap isi semua field.'); return;
      }
      if (password !== confirm) {
        alert('Password tidak cocok.'); return;
      }
      if (password.length < 8) {
        alert('Password minimal 8 karakter.'); return;
      }

      // Save to sessionStorage for step 2
      sessionStorage.setItem('reg_email', email);
      sessionStorage.setItem('reg_password', password);
      sessionStorage.setItem('reg_phone', phone);

      window.location.href = 'register-2.html';
    }
  </script>
</body>
</html>
